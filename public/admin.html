<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICraft Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { padding: 48px 24px; }
        .admin-container { max-width: 800px; margin: 0 auto; }
        .glass-panel { padding: 32px; margin-bottom: 32px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .form-group input { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            padding: 12px; border-radius: 8px; color: white; outline: none; 
        }
        .form-group input:focus { border-color: var(--accent-color); }
        .video-list { display: flex; flex-direction: column; gap: 16px; }
        .video-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--glass-border); 
        }
        .video-info { display: flex; align-items: center; gap: 16px; }
        .video-info img { width: 120px; border-radius: 4px; }
        .delete-btn { color: #ef4444; cursor: pointer; font-size: 24px; }
        .delete-btn:hover { color: #dc2626; }
    </style>
</head>
<body>
    <div class="bg-glow top-glow"></div>
    <div class="admin-container">
        <div style="margin-bottom: 32px;">
            <a href="/" style="color: var(--accent-light);"><i class="ph ph-arrow-left"></i> Back to Website</a>
        </div>
        
        <h1 style="margin-bottom: 32px;">Admin Dashboard</h1>
        
        <div class="glass-panel" id="auth-section">
            <h3>Authentication Required</h3>
            <p style="margin-bottom: 16px; color: var(--text-secondary);">Enter the admin password to manage videos.</p>
            <div class="form-group">
                <input type="password" id="admin-pass" placeholder="Password (default is aicraft_admin_secret)">
            </div>
            <button id="login-btn" class="btn-fluid">Login</button>
        </div>

        <div id="dashboard-section" style="display: none;">
            <div class="glass-panel">
                <h3>Add New YouTube Video</h3>
                <div class="form-group" style="margin-top: 16px;">
                    <label>YouTube Video URL</label>
                    <input type="text" id="yt-url" placeholder="e.g. https://www.youtube.com/watch?v=dQw4w9WgXcQ">
                </div>
                <div class="form-group">
                    <label>Video Title (Optional)</label>
                    <input type="text" id="yt-title" placeholder="e.g. Awesome Tuition Promo">
                </div>
                <button id="add-video-btn" class="btn-fluid">Add Video</button>
            </div>

            <div class="glass-panel">
                <h3>Manage Videos</h3>
                <div class="video-list" id="video-list" style="margin-top: 16px;">
                    <!-- Videos injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
