<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AICraft Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { padding: 48px 24px; }
        .admin-container { max-width: 800px; margin: 0 auto; }
        .glass-panel { padding: 32px; margin-bottom: 32px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .form-group input { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            padding: 12px; border-radius: 8px; color: white; outline: none; 
        }
        .form-group input:focus { border-color: var(--accent-color); }
        .video-list { display: flex; flex-direction: column; gap: 16px; }
        .video-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--glass-border); 
        }
        .video-info { display: flex; align-items: center; gap: 16px; }
        .video-info img { width: 120px; border-radius: 4px; }
        .delete-btn { color: #ef4444; cursor: pointer; font-size: 24px; }
        .delete-btn:hover { color: #dc2626; }
    </style>
</head>
<body>
    <div class="bg-glow top-glow"></div>
    <div class="admin-container">
        <div style="margin-bottom: 32px;">
            <a href="/" style="color: var(--accent-light);"><i class="ph ph-arrow-left"></i> Back to Website</a>
        </div>
        
        <h1 style="margin-bottom: 32px;">Admin Dashboard</h1>
        
        <div class="glass-panel" id="auth-section">
            <h3>Authentication Required</h3>
            <p style="margin-bottom: 16px; color: var(--text-secondary);">Enter the admin password to manage videos.</p>
            <div class="form-group">
                <input type="password" id="admin-pass" placeholder="Password">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); cursor: pointer; margin-top: 4px;">
                    <input type="checkbox" id="show-pass-toggle" style="width: auto;"> Show Password
                </label>
            </div>
            <button id="login-btn" class="btn-fluid">Login</button>
            <div style="text-align: center; margin-top: 16px;">
                <a href="#" id="forgot-pass-link" style="color: var(--accent-color); font-size: 14px;">Forgot Password?</a>
            </div>
        </div>

        <div class="glass-panel" id="reset-section" style="display: none;">
            <h3>Reset Password</h3>
            <p id="secret-question-display" style="margin-bottom: 16px; color: var(--text-secondary);">Loading question...</p>
            <div class="form-group">
                <input type="text" id="secret-answer" placeholder="Your Answer">
            </div>
            <div class="form-group">
                <input type="password" id="reset-new-pass" placeholder="New Password">
            </div>
            <div style="display: flex; gap: 16px;">
                <button id="reset-btn" class="btn-fluid">Reset</button>
                <button id="cancel-reset-btn" class="btn-fluid" style="background: transparent; border: 1px solid var(--glass-border);">Cancel</button>
            </div>
        </div>

        <div id="dashboard-section" style="display: none;">
            <div class="glass-panel">
                <h3>Security Settings</h3>
                <div class="form-group" style="margin-top: 16px;">
                    <label>New Password</label>
                    <input type="password" id="change-pass-input" placeholder="Enter new password (min 4 chars)">
                </div>
                <button id="change-pass-btn" class="btn-fluid" style="background: var(--glass-bg); border: 1px solid var(--glass-border);">Update Password</button>
            </div>

            <div class="glass-panel">
                <h3>Add New Video</h3>
                <div class="form-group" style="margin-top: 16px;">
                    <label>Platform</label>
                    <select id="video-platform" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; color: white; outline: none;">
                        <option value="youtube" style="background-color: #0f172a; color: white;">YouTube</option>
                        <option value="facebook" style="background-color: #0f172a; color: white;">Facebook</option>
                        <option value="google_drive" style="background-color: #0f172a; color: white;">Google Drive</option>
                    </select>
                </div>
                <div class="form-group">
                    <label id="url-label">Video URL or YouTube ID</label>
                    <input type="text" id="yt-url" placeholder="e.g. https://www.youtube.com/watch?v=... or https://www.facebook.com/...">
                </div>
                <div class="form-group">
                    <label>Video Title (Optional)</label>
                    <input type="text" id="yt-title" placeholder="e.g. Awesome Tuition Promo">
                </div>
                <button id="add-video-btn" class="btn-fluid">Add Video</button>
            </div>

            <div class="glass-panel">
                <h3>Manage Videos</h3>
                <div class="video-list" id="video-list" style="margin-top: 16px;">
                    <!-- Videos injected here -->
                </div>
            </div>
        </div>

        <!-- Edit Video Modal -->
        <div id="edit-video-modal" class="glass-panel" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 90%; max-width: 500px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <h3>Edit Video</h3>
            <input type="hidden" id="edit-video-id">
            <div class="form-group" style="margin-top: 16px;">
                <label>Platform</label>
                <select id="edit-video-platform" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 8px; color: white; outline: none;">
                    <option value="youtube" style="background-color: #0f172a; color: white;">YouTube</option>
                    <option value="facebook" style="background-color: #0f172a; color: white;">Facebook</option>
                    <option value="google_drive" style="background-color: #0f172a; color: white;">Google Drive</option>
                </select>
            </div>
            <div class="form-group">
                <label>Video URL or YouTube ID</label>
                <input type="text" id="edit-video-url">
            </div>
            <div class="form-group">
                <label>Video Title</label>
                <input type="text" id="edit-video-title">
            </div>
            <div style="display: flex; gap: 16px; margin-top: 16px;">
                <button id="save-edit-btn" class="btn-fluid">Save Changes</button>
                <button id="cancel-edit-btn" class="btn-fluid" style="background: transparent; border: 1px solid var(--glass-border);">Cancel</button>
            </div>
        </div>
        <!-- Modal Overlay -->
        <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; backdrop-filter: blur(5px);"></div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
